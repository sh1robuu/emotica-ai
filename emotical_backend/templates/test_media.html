<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotica AI - Audio & Vision AI</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #343a40; color: white; padding-top: 20px; }
        .sidebar a { color: #adb5bd; text-decoration: none; display: block; padding: 10px 20px; }
        .sidebar a:hover, .sidebar a.active { background: #495057; color: white; }
        .content-area { padding: 30px; }
        .result-box { background: #e9ecef; padding: 15px; border-radius: 5px; font-family: monospace; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar Navigation -->
            <div class="col-md-3 col-lg-2 sidebar">
                <h4 class="text-center mb-4">Emotica Admin</h4>
                <a href="/test">1. Authentication</a>
                <a href="/test/chat">2. AI Therapy & Memory</a>
                <a href="/test/rag">3. RAG & Global DB</a>
                <a href="/test/media" class="active">4. Speech & Vision AI</a>
            </div>

            <!-- Main Content Area -->
            <div class="col-md-9 col-lg-10 content-area">
                <h2>Media Intelligence AI Models</h2>
                
                <div class="row mt-4">
                    <!-- Vision (Upload Picture) -->
                    <div class="col-md-4 mb-4">
                        <div class="card shadow-sm border-info">
                            <div class="card-header bg-info text-white">Facial Emotion (ViT)</div>
                            <div class="card-body">
                                <input type="file" id="imageFile" class="form-control mb-2" accept=".jpg,.jpeg,.png">
                                <button class="btn btn-info text-white w-100 mb-2" onclick="detectEmotion()">Emotion (Lightweight ViT)</button>
                                <button class="btn btn-outline-info w-100 mb-2" onclick="analyzeDetail()">Summary & Title (Large VL)</button>
                                <img id="uploadedImage" class="img-fluid rounded mt-2" style="display:none; max-height: 150px;">
                            </div>
                        </div>
                    </div>

                    <!-- TTS (Generate Voice) -->
                    <div class="col-md-4 mb-4">
                        <div class="card shadow-sm border-success">
                            <div class="card-header bg-success text-white">Text-To-Speech (MMS)</div>
                            <div class="card-body">
                                <textarea id="ttsText" class="form-control mb-2" rows="2" placeholder="Chào bạn, tôi là Emotica."></textarea>
                                <select id="ttsLang" class="form-select mb-2">
                                    <option value="vi">Vietnamese (vi)</option>
                                    <option value="en">English (en)</option>
                                </select>
                                <button class="btn btn-success w-100 mb-2" onclick="synthesizeAudio()">Generate & Play</button>
                                <audio id="ttsAudio" controls class="w-100 mt-2" style="display:none;"></audio>
                            </div>
                        </div>
                    </div>

                    <!-- Voice STT (Transcribe Voice) -->
                    <div class="col-md-4 mb-4">
                        <div class="card shadow-sm border-warning">
                            <div class="card-header bg-warning">Speech-To-Text (Whisper)</div>
                            <div class="card-body">
                                <input type="file" id="audioFile" class="form-control mb-2" accept=".wav,.mp3">
                                <button class="btn btn-warning w-100 mb-2" onclick="transcribeAudio()">Transcribe Audio</button>
                                <button class="btn btn-outline-warning w-100" onclick="analyzeSpeechEmotion()">Analyze Audio Emotion</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-12">
                        <h5>Console Output:</h5>
                        <div class="result-box" id="mediaResult">Results will stream here...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = 'http://localhost:8000/api';

        function updateOutput(text) {
            document.getElementById('mediaResult').innerText = typeof text === 'object' ? JSON.stringify(text, null, 2) : text;
        }

        function getAuthHeaders() {
            const token = localStorage.getItem('jwtToken');
            return token ? { 'Authorization': `Bearer ${token}` } : {};
        }

        // VISION
        async function detectEmotion() {
            const fileInput = document.getElementById('imageFile');
            if(!fileInput.files[0]) return updateOutput("Lỗi: Please select an image for AI.");
            
            // Preview Image
            const imgEl = document.getElementById('uploadedImage');
            imgEl.src = URL.createObjectURL(fileInput.files[0]);
            imgEl.style.display = 'block';

            updateOutput("Analyzing Facial Expressions via transformer model...");
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const res = await fetch(`${BASE_URL}/vision/emotion`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: formData
                });
                const data = await res.json();
                updateOutput(data);
            } catch (e) { updateOutput(e.message); }
        }

        async function analyzeDetail() {
            const fileInput = document.getElementById('imageFile');
            if(!fileInput.files[0]) return updateOutput("Lỗi: Please select an image for AI.");
            
            // Preview Image
            const imgEl = document.getElementById('uploadedImage');
            imgEl.src = URL.createObjectURL(fileInput.files[0]);
            imgEl.style.display = 'block';

            updateOutput("Sending image base64 to Large Vision LLM (ministral-3:8b-cloud)... This might take a few seconds.");
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const res = await fetch(`${BASE_URL}/vision/analyze_detail`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: formData
                });
                const data = await res.json();
                updateOutput(data);
            } catch (e) { updateOutput(e.message); }
        }

        // TEXT TO SPEECH
        async function synthesizeAudio() {
            const text = document.getElementById('ttsText').value;
            const lang = document.getElementById('ttsLang').value;
            if(!text) return updateOutput("Lỗi: Please enter text to speak.");
            updateOutput("Synthesizing voice wave for: " + text);
            try {
                const res = await fetch(`${BASE_URL}/speech/synthesize`, {
                    method: 'POST',
                    headers: { ...getAuthHeaders(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, language: lang })
                });
                if(!res.ok) throw new Error("HTTP " + res.status);
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const audioEl = document.getElementById('ttsAudio');
                audioEl.src = url;
                audioEl.style.display = 'block';
                audioEl.play();
                updateOutput("Audio playing...");
            } catch (e) { updateOutput(e.message); }
        }

        // SPEECH TO TEXT
        async function doAudioPost(endpoint, action) {
            const fileInput = document.getElementById('audioFile');
            if(!fileInput.files[0]) return updateOutput("Lỗi: Please select an audio file.");
            updateOutput(action + " via Whisper model...");
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            try {
                const res = await fetch(`${BASE_URL}${endpoint}`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: formData
                });
                const data = await res.json();
                updateOutput(data);
            } catch (e) { updateOutput(e.message); }
        }

        function transcribeAudio() { doAudioPost('/speech/transcribe', 'Transcribing Audio'); }
        function analyzeSpeechEmotion() { doAudioPost('/speech/emotion', 'Analyzing Voice Emotion'); }
    </script>
</body>
</html>
