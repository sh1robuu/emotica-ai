<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotica AI - Chat & Memory</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #343a40; color: white; padding-top: 20px; }
        .sidebar a { color: #adb5bd; text-decoration: none; display: block; padding: 10px 20px; }
        .sidebar a:hover, .sidebar a.active { background: #495057; color: white; }
        .content-area { padding: 30px; }
        .result-box { background: #e9ecef; padding: 15px; border-radius: 5px; font-family: monospace; white-space: pre-wrap; word-break: break-all; height: 300px; overflow-y: auto; }
        .thinking { color: #6c757d; font-style: italic; display: block; margin-bottom: 10px; border-left: 3px solid #ccc; padding-left: 10px; }
        .normal-text { color: #212529; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar Navigation -->
            <div class="col-md-3 col-lg-2 sidebar">
                <h4 class="text-center mb-4">Emotica Admin</h4>
                <a href="/test">1. Authentication</a>
                <a href="/test/chat" class="active">2. AI Therapy & Memory</a>
                <a href="/test/rag">3. RAG & Global DB</a>
                <a href="/test/media">4. Speech & Vision AI</a>
            </div>

            <!-- Main Content Area -->
            <div class="col-md-9 col-lg-10 content-area">
                <h2>Psychological Therapist Chat & Memory</h2>
                
                <div class="row mt-4">
                    <!-- Memory Panel -->
                    <div class="col-md-5 mb-4">
                        <div class="card shadow-sm">
                            <div class="card-header bg-warning">User Core Memory (Max 4000 Tokens)</div>
                            <div class="card-body">
                                <p class="text-muted small">Update this to give the AI therapist persistent context.</p>
                                <textarea id="memoryText" class="form-control mb-2" rows="5" placeholder="e.g. The user is a college student dealing with exam anxiety..."></textarea>
                                <div class="d-flex justify-content-between">
                                    <button class="btn btn-outline-secondary btn-sm" onclick="getMemory()">Fetch Persistent Memory</button>
                                    <button class="btn btn-warning btn-sm" onclick="updateMemory()">Save Memory API</button>
                                </div>
                                <div id="memoryResult" class="text-success mt-2 small"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Chat Panel -->
                    <div class="col-md-7 mb-4">
                        <div class="card shadow-sm h-100">
                            <div class="card-header bg-primary text-white">SSE Streaming Chat (Therapist)</div>
                            <div class="card-body d-flex flex-column">
                                <div class="result-box flex-grow-1 mb-3" id="chatBox"></div>
                                <div class="input-group">
                                    <textarea id="chatInput" class="form-control" rows="2" placeholder="Hello doctor, I feel very sad..."></textarea>
                                    <button class="btn btn-primary" onclick="sendSSEChat()">Send</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = 'http://localhost:8000/api';
        
        function getAuthHeaders() {
            const token = localStorage.getItem('jwtToken');
            return token ? { 'Authorization': `Bearer ${token}` } : {};
        }

        // ================= MEMORY ================= //
        async function getMemory() {
            try {
                const res = await fetch(`${BASE_URL}/memory`, { headers: getAuthHeaders() });
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('memoryText').value = data.memory_text || "";
                    document.getElementById('memoryResult').innerText = "Memory loaded.";
                } else {
                    document.getElementById('memoryResult').className = "text-danger mt-2 small";
                    document.getElementById('memoryResult').innerText = "Need login first.";
                }
            } catch (e) { console.error(e); }
        }

        async function updateMemory() {
            try {
                const res = await fetch(`${BASE_URL}/memory`, {
                    method: 'POST',
                    headers: { ...getAuthHeaders(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ memory_text: document.getElementById('memoryText').value })
                });
                const data = await res.json();
                document.getElementById('memoryResult').innerText = data.status === "success" ? "Memory saved! It will be injected into future chats." : data.detail;
            } catch (e) { console.error(e); }
        }

        // ================= CHAT SSE ================= //
        let chatHistoryCount = 0;

        async function sendSSEChat() {
            const inputField = document.getElementById('chatInput');
            const userText = inputField.value;
            if (!userText) return;

            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML += `<div><strong>You:</strong> ${userText}</div>`;
            inputField.value = '';
            
            chatHistoryCount++;
            const msgId = `ai-msg-${chatHistoryCount}`;
            chatBox.innerHTML += `<div id="${msgId}"><strong>Doctor:</strong> </div>`;
            
            try {
                const response = await fetch(`${BASE_URL}/chat`, {
                    method: 'POST',
                    headers: { ...getAuthHeaders(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "ministral-3:14b-cloud",
                        messages: [{ role: "user", content: userText }]
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                
                const aiContainer = document.getElementById(msgId);
                let currentThinkSpan = null;
                let currentNormalSpan = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunkData = decoder.decode(value, { stream: true });
                    const lines = chunkData.split("\n\n");
                    
                    for (const line of lines) {
                        if (line.startsWith("data: ")) {
                            const dataStr = line.replace("data: ", "");
                            if (dataStr.trim() === "[DONE]") {
                                chatBox.scrollTop = chatBox.scrollHeight;
                                break;
                            }
                            
                            try {
                                const payload = JSON.parse(dataStr);
                                const chunkText = payload.chunk;
                                
                                if (payload.is_thinking) {
                                    if (!currentThinkSpan) {
                                        currentThinkSpan = document.createElement('span');
                                        currentThinkSpan.className = 'thinking';
                                        aiContainer.appendChild(currentThinkSpan);
                                        currentNormalSpan = null; // Re-create normal span after thinking
                                    }
                                    currentThinkSpan.innerHTML += chunkText.replace(/\n/g, "<br>");
                                } else {
                                    if (!currentNormalSpan) {
                                        currentNormalSpan = document.createElement('span');
                                        currentNormalSpan.className = 'normal-text';
                                        aiContainer.appendChild(currentNormalSpan);
                                        currentThinkSpan = null; 
                                    }
                                    currentNormalSpan.innerHTML += chunkText.replace(/\n/g, "<br>");
                                }
                                chatBox.scrollTop = chatBox.scrollHeight;
                            } catch (e) {
                                // sometimes partial JSON streams happen if not strictly delineated, but our backend handles it.
                            }
                        }
                    }
                }
            } catch (e) {
                console.error("SSE Error: ", e);
            }
        }
    </script>
</body>
</html>
