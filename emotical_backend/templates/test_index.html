<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotica AI - API Test Hub</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #343a40; color: white; padding-top: 20px; }
        .sidebar a { color: #adb5bd; text-decoration: none; display: block; padding: 10px 20px; }
        .sidebar a:hover, .sidebar a.active { background: #495057; color: white; }
        .content-area { padding: 30px; }
        .result-box { background: #e9ecef; padding: 15px; border-radius: 5px; font-family: monospace; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar Navigation -->
            <div class="col-md-3 col-lg-2 sidebar">
                <h4 class="text-center mb-4">Emotica Admin</h4>
                <a href="/test" class="active">1. Authentication</a>
                <a href="/test/chat">2. AI Therapy & Memory</a>
                <a href="/test/rag">3. RAG & Global DB</a>
                <a href="/test/media">4. Speech & Vision AI</a>
            </div>

            <!-- Main Content Area -->
            <div class="col-md-9 col-lg-10 content-area">
                <h2>Authentication & Dashboard</h2>
                <div id="tokenIndicator" class="alert alert-success" style="display:none;">
                    <strong>Authenticated!</strong> Valid JWT Token saved in LocalStorage.
                </div>

                <div class="row">
                    <!-- Register -->
                    <div class="col-md-6 mb-4">
                        <div class="card shadow-sm">
                            <div class="card-header bg-primary text-white">Register User</div>
                            <div class="card-body">
                                <input type="text" id="regName" class="form-control mb-2" placeholder="Name" value="Patient A">
                                <input type="email" id="regEmail" class="form-control mb-2" placeholder="Email" value="admin@test.com">
                                <input type="password" id="regPassword" class="form-control mb-2" placeholder="Password" value="password123">
                                <button class="btn btn-primary w-100" onclick="register()">Register</button>
                            </div>
                        </div>
                    </div>
                    <!-- Login -->
                    <div class="col-md-6 mb-4">
                        <div class="card shadow-sm">
                            <div class="card-header bg-success text-white">Login</div>
                            <div class="card-body">
                                <input type="email" id="logEmail" class="form-control mb-2" placeholder="Email" value="admin@test.com">
                                <input type="password" id="logPassword" class="form-control mb-2" placeholder="Password" value="password123">
                                <button class="btn btn-success w-100" onclick="login()">Login</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-12">
                        <div class="card shadow-sm mb-4">
                            <div class="card-header bg-info text-white">Profile Actions</div>
                            <div class="card-body">
                                <button class="btn btn-info text-white mb-2" onclick="getMe()">Verify Token (GET /api/auth/me)</button>
                                <h5>Console Output:</h5>
                                <div class="result-box" id="authResult">Results will stream here...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = 'http://localhost:8000/api';
        
        // Restore token indicator on page load
        if(localStorage.getItem('jwtToken')) {
            document.getElementById('tokenIndicator').style.display = 'block';
        }

        function updateOutput(id, text) {
            document.getElementById(id).innerText = typeof text === 'object' ? JSON.stringify(text, null, 2) : text;
        }

        function getAuthHeaders() {
            const token = localStorage.getItem('jwtToken');
            return token ? { 'Authorization': `Bearer ${token}` } : {};
        }

        async function register() {
            try {
                const res = await fetch(`${BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('regName').value,
                        email: document.getElementById('regEmail').value,
                        password: document.getElementById('regPassword').value
                    })
                });
                const data = await res.json();
                updateOutput('authResult', data);
            } catch (e) { updateOutput('authResult', e.message); }
        }

        async function login() {
            try {
                const res = await fetch(`${BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('logEmail').value,
                        password: document.getElementById('logPassword').value
                    })
                });
                const data = await res.json();
                if (data.access_token) {
                    localStorage.setItem('jwtToken', data.access_token);
                    document.getElementById('tokenIndicator').style.display = 'block';
                }
                updateOutput('authResult', data);
            } catch (e) { updateOutput('authResult', e.message); }
        }

        async function getMe() {
            try {
                const res = await fetch(`${BASE_URL}/auth/me`, {
                    headers: getAuthHeaders()
                });
                const data = await res.json();
                updateOutput('authResult', data);
            } catch (e) { updateOutput('authResult', e.message); }
        }
    </script>
</body>
</html>
