<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotica AI - Admin Websocket</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #343a40; color: white; padding-top: 20px; }
        .sidebar a { color: #adb5bd; text-decoration: none; display: block; padding: 10px 20px; }
        .sidebar a:hover, .sidebar a.active { background: #495057; color: white; }
        .content-area { padding: 30px; }
        .result-box { background: #1e1e1e; color: #00ff00; padding: 15px; border-radius: 5px; font-family: monospace; white-space: pre-wrap; word-break: break-all; height: 500px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar Navigation -->
            <div class="col-md-3 col-lg-2 sidebar">
                <h4 class="text-center mb-4 text-danger">Emotica Admin</h4>
                <a href="/test">1. Authentication</a>
                <a href="/test/chat">2. AI Therapy & Memory</a>
                <a href="/test/rag">3. RAG & Global DB</a>
                <a href="/test/media">4. Speech & Vision AI</a>
                <a href="/test/admin" class="active text-warning">5. Live Admin Dashboard</a>
            </div>

            <!-- Main Content Area -->
            <div class="col-md-9 col-lg-10 content-area">
                <h2>Admin WebSocket Stream</h2>
                <div class="row mt-4">
                    <div class="col-12">
                        <div class="card shadow-sm border-danger">
                            <div class="card-header bg-danger text-white d-flex justify-content-between">
                                <span>Real-time System Logs & Metrics</span>
                                <span id="wsStatus" class="badge bg-secondary">Offline</span>
                            </div>
                            <div class="card-body">
                                <div class="d-flex mb-3">
                                    <button class="btn btn-success me-2" onclick="connectWS()">Connect Live Stream</button>
                                    <button class="btn btn-danger" onclick="disconnectWS()">Disconnect</button>
                                </div>
                                <div class="result-box" id="adminLog"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws;
        const logBox = document.getElementById('adminLog');
        const statusBadge = document.getElementById('wsStatus');

        function logToConsole(message) {
            const time = new Date().toLocaleTimeString();
            logBox.innerHTML += `[${time}] ${message}\n`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function connectWS() {
            if (ws) return;
            const wsUrl = `ws://${window.location.host}/api/admin/ws`;
            
            logToConsole("Connecting to " + wsUrl + "...");
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                statusBadge.className = "badge bg-success";
                statusBadge.innerText = "Live";
                logToConsole("WebSocket connection established.");
                
                // Ping loop
                window.pingInterval = setInterval(() => {
                    if(ws.readyState === WebSocket.OPEN) {
                        ws.send("ping");
                    }
                }, 30000);
            };

            ws.onmessage = (event) => {
                if (event.data !== "pong") {
                    logToConsole(event.data);
                }
            };

            ws.onclose = () => {
                statusBadge.className = "badge bg-secondary";
                statusBadge.innerText = "Offline";
                logToConsole("WebSocket disconnected.");
                clearInterval(window.pingInterval);
                ws = null;
            };

            ws.onerror = (error) => {
                logToConsole("WebSocket Error occurred.");
            };
        }

        function disconnectWS() {
            if (ws) {
                ws.close();
            }
        }
    </script>
</body>
</html>
